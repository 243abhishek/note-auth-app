<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-96">
    <h2 class="text-2xl font-bold text-white mb-6 text-center">Sign In</h2>

    <input id="username" type="text" placeholder="Username"
      class="w-full mb-4 p-3 rounded bg-gray-700 text-white outline-none">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-3 rounded bg-gray-700 text-white outline-none">

    <button onclick="signin()"
      class="w-full bg-green-500 hover:bg-green-600 text-white p-3 rounded">
      Login
    </button>

    <p class="text-gray-400 text-sm mt-4 text-center">
      Don't have an account?
      <a href="signup.html" class="text-green-400">Sign up</a>
    </p>
  </div>

<script>
async function signin() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/signin", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.message);
    return;
  }

  // 🔥 store token
  localStorage.setItem("token", data.token);

  alert("Login successful 🚀");

  // 🔥 redirect to notes page
  window.location.href = "/notes";
}
</script>
</body>
</html>

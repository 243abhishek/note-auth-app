<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-96">
    <h2 class="text-2xl font-bold text-white mb-6 text-center">Sign Up</h2>

    <input id="username" type="text" placeholder="Username"
      class="w-full mb-4 p-3 rounded bg-gray-700 text-white outline-none">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-3 rounded bg-gray-700 text-white outline-none">

    <button onclick="signup()"
      class="w-full bg-blue-500 hover:bg-blue-600 text-white p-3 rounded">
      Register
    </button>

    <p class="text-gray-400 text-sm mt-4 text-center">
      Already have an account?
      <a href="signin.html" class="text-blue-400">Sign in</a>
    </p>
  </div>
<script>
async function signup() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/signup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.message);
    return;
  }

  alert(data.message);

  // redirect to login
  window.location.href = "/signin.html";
}
</script>

</body>
</html>
